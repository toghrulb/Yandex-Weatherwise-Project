version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw:/data/raw:ro
      - ./ml/artifacts:/ml/artifacts:ro
    environment:
      - DATA_RAW_PATH=/data/raw
      - ML_ARTIFACTS_PATH=/ml/artifacts
      - tutor_openai_api=${tutor_openai_api}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
